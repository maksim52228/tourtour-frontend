<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tourTitle">Тур</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Добавьте стили для страницы тура */
    </style>
</head>
<body>
    <div class="container">
        <div id="tourContent">
            <!-- Контент будет загружен из Strapi -->
        </div>
    </div>

    <script>
        const STRAPI_URL = 'http://localhost:1337';
        const STRAPI_API_TOKEN = 'ваш-токен';

        async function loadTour() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                window.location.href = '/';
                return;
            }

            const response = await fetch(`${STRAPI_URL}/api/tours?filters[slug][$eq]=${slug}&populate=*`, {
                headers: {
                    'Authorization': `Bearer ${STRAPI_API_TOKEN}`
                }
            });

            const data = await response.json();
            const tour = data.data[0];

            if (!tour) {
                window.location.href = '/';
                return;
            }

            // Заполнение страницы данными
            document.getElementById('tourTitle').textContent = tour.attributes.title;
            document.getElementById('tourContent').innerHTML = `
                <h1>${tour.attributes.title}</h1>
                <img src="${STRAPI_URL + tour.attributes.image.data.attributes.url}" alt="${tour.attributes.title}">
                <p>${tour.attributes.description}</p>
                <div class="price">$${tour.attributes.price}</div>
            `;
        }

        loadTour();
    </script>
</body>
</html>
